# Rimuru ships this config so iii-engine starts with durable state out
# of the box. Every worker that needs to persist something writes to
# ${HOME}/.local/share/rimuru/<name>_store via iii's file_based KV
# backend. iii expands ${HOME} inline before parsing YAML.
#
# The install script copies this file to ~/.config/rimuru/config.yaml
# and the README tells users to launch iii with:
#
#     iii --config ~/.config/rimuru/config.yaml
#
# Without this config, iii runs with the default in-memory store and
# loses every cost record, budget counter, and guard entry on restart
# (iii prints a loud warning when that happens).

modules:
  - name: iii-http
    config:
      port: 3111
      host: 0.0.0.0
      default_timeout: 30000
      cors:
        allowed_origins:
          - "*"
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  - name: iii-stream
    config:
      port: 3112
      host: 127.0.0.1
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: ${HOME}/.local/share/rimuru/stream_store
          save_interval_ms: 250

  - name: iii-state
    config:
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: ${HOME}/.local/share/rimuru/state_store
          save_interval_ms: 250

  - name: iii-queue
    config:
      adapter:
        name: builtin
        config:
          store_method: file_based
          file_path: ${HOME}/.local/share/rimuru/queue_store
          save_interval_ms: 250

  - name: iii-pubsub
    config:
      adapter:
        name: local

  - name: iii-cron
    config:
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: ${HOME}/.local/share/rimuru/cron_locks
          save_interval_ms: 250

  - name: iii-observability
    config:
      enabled: true
      service_name: rimuru
      exporter: memory
      sampling_ratio: 1.0
      memory_max_spans: 10000
      metrics_enabled: true
      metrics_exporter: memory
      logs_enabled: true
      logs_exporter: memory
      logs_max_count: 1000
      logs_console_output: true
      level: info
