name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Rimuru ${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        working-directory: ui
        run: npm ci && npm run build

      - name: Upload UI dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

  build-linux:
    name: Build (Linux x64)
    runs-on: ubuntu-latest
    needs: [create-release, build-ui]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Build
        run: cargo build --release -p rimuru-core -p rimuru-cli -p rimuru-tui

      - name: Create tarball
        run: |
          mkdir -p dist
          cp target/release/rimuru-worker target/release/rimuru target/release/rimuru-tui dist/
          cp README.md LICENSE dist/ 2>/dev/null || true
          cd dist && tar -czvf ../rimuru-${{ needs.create-release.outputs.version }}-linux-x64.tar.gz *

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: rimuru-${{ needs.create-release.outputs.version }}-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build (macOS x64)
    runs-on: macos-latest
    needs: [create-release, build-ui]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Build
        run: cargo build --release -p rimuru-core -p rimuru-cli -p rimuru-tui

      - name: Create tarball
        run: |
          mkdir -p dist
          cp target/release/rimuru-worker target/release/rimuru target/release/rimuru-tui dist/
          cp README.md LICENSE dist/ 2>/dev/null || true
          cd dist && tar -czvf ../rimuru-${{ needs.create-release.outputs.version }}-macos-x64.tar.gz *

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: rimuru-${{ needs.create-release.outputs.version }}-macos-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest
    needs: [create-release, build-ui]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Build
        run: cargo build --release -p rimuru-core -p rimuru-cli -p rimuru-tui

      - name: Create zip
        run: |
          mkdir dist
          copy target\release\rimuru-worker.exe dist\
          copy target\release\rimuru.exe dist\
          copy target\release\rimuru-tui.exe dist\
          copy README.md dist\ 2>/dev/null || echo .
          copy LICENSE dist\ 2>/dev/null || echo .
          Compress-Archive -Path dist\* -DestinationPath rimuru-${{ needs.create-release.outputs.version }}-windows-x64.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: rimuru-${{ needs.create-release.outputs.version }}-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop-linux:
    name: Desktop (Linux AppImage)
    runs-on: ubuntu-latest
    needs: [create-release, build-ui]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Build Tauri app
        working-directory: crates/rimuru-desktop
        run: npx @tauri-apps/cli build -- --bundles appimage

      - name: Upload AppImage
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop-macos:
    name: Desktop (macOS DMG)
    runs-on: macos-latest
    needs: [create-release, build-ui]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Build Tauri app
        working-directory: crates/rimuru-desktop
        run: npx @tauri-apps/cli build -- --bundles dmg

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/rimuru
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-success:
    name: Release Success
    runs-on: ubuntu-latest
    needs:
      - create-release
      - build-linux
      - build-macos
      - build-windows
      - build-desktop-linux
      - build-desktop-macos
      - docker
    if: always()
    steps:
      - name: Summary
        run: |
          echo "Release ${{ needs.create-release.outputs.version }} completed!"
          echo "  Linux: ${{ needs.build-linux.result }}"
          echo "  macOS: ${{ needs.build-macos.result }}"
          echo "  Windows: ${{ needs.build-windows.result }}"
          echo "  Desktop Linux: ${{ needs.build-desktop-linux.result }}"
          echo "  Desktop macOS: ${{ needs.build-desktop-macos.result }}"
          echo "  Docker: ${{ needs.docker.result }}"
