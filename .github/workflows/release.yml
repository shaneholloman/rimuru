name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Rimuru ${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        working-directory: ui
        run: npm ci && npm run build

      - name: Upload UI dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

  build-binaries:
    name: Build ${{ matrix.label }}
    needs: [create-release, build-ui]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - label: linux-arm64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - label: macos-x64
            runner: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - label: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - label: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p rimuru-core -p rimuru-cli -p rimuru-tui

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rimuru-worker dist/
          cp target/${{ matrix.target }}/release/rimuru dist/
          cp target/${{ matrix.target }}/release/rimuru-tui dist/
          cp README.md LICENSE dist/ 2>/dev/null || true
          cd dist && tar -czvf ../rimuru-${{ needs.create-release.outputs.version }}-${{ matrix.label }}.tar.gz *

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\${{ matrix.target }}\release\rimuru-worker.exe dist\
          Copy-Item target\${{ matrix.target }}\release\rimuru.exe dist\
          Copy-Item target\${{ matrix.target }}\release\rimuru-tui.exe dist\
          if (Test-Path README.md) { Copy-Item README.md dist\ }
          if (Test-Path LICENSE) { Copy-Item LICENSE dist\ }
          Compress-Archive -Path dist\* -DestinationPath rimuru-${{ needs.create-release.outputs.version }}-${{ matrix.label }}.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: |
            rimuru-${{ needs.create-release.outputs.version }}-${{ matrix.label }}.${{ matrix.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop:
    name: Desktop ${{ matrix.label }}
    needs: [create-release, build-ui]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-appimage
            runner: ubuntu-22.04
            bundle: appimage
            asset_glob: target/release/bundle/appimage/*.AppImage
          - label: linux-deb
            runner: ubuntu-22.04
            bundle: deb
            asset_glob: target/release/bundle/deb/*.deb
          - label: macos-dmg-x64
            runner: macos-13
            bundle: dmg
            asset_glob: target/release/bundle/dmg/*.dmg
          - label: macos-dmg-arm64
            runner: macos-14
            bundle: dmg
            asset_glob: target/release/bundle/dmg/*.dmg
          - label: windows-msi
            runner: windows-latest
            bundle: msi
            asset_glob: target/release/bundle/msi/*.msi
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux system deps
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Build Tauri bundle
        working-directory: crates/rimuru-desktop
        shell: bash
        run: npx -p @tauri-apps/cli@^2.1.0 -y tauri build --bundles ${{ matrix.bundle }}

      - name: Upload bundle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: ${{ matrix.asset_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: create-release
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-success:
    name: Release Success
    runs-on: ubuntu-latest
    needs:
      - create-release
      - build-binaries
      - build-desktop
      - docker
    if: always()
    steps:
      - name: Summary
        run: |
          echo "Release ${{ needs.create-release.outputs.version }} completed!"
          echo "  Binaries: ${{ needs.build-binaries.result }}"
          echo "  Desktop bundles: ${{ needs.build-desktop.result }}"
          echo "  Docker: ${{ needs.docker.result }}"
